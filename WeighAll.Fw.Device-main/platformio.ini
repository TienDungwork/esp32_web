; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
boards_dir = ./boards
lib_dir = ./libraries

;------------------------------------------------ 
;                   MY PROJECT
;------------------------------------------------

src_dir = myProject/${platformio.default_envs}

;main
;default_envs = esp_tconnect
default_envs = esp_ota
;default_envs = esp32_mp3_sd

;test driver
;default_envs = test_beam
;default_envs = testIO
;default_envs = test_uart

;------------------------------------------------ 
;                     MY ENV
;------------------------------------------------

;[env:esp_tconnect]
[env:esp_ota]
platform = espressif32 @6.5.0
board = esp32s3_flash_16MB
framework = arduino
upload_port = COM22
monitor_port = COM22
monitor_speed = 115200 ;Serial Baud Rate Setting

; debug_tool = esp-builtin
; upload_protocol = esp-builtin
upload_speed = 921600 ; 460800, 512000, 460800, 256000, 115200
board_upload.flash_size = 16MB 

board_build.memory_type = qio_opi ;Enable internal PSRAM
; board_build.memory_type = qio_qspi ;Enable external PSRAM

;board_build.partitions = default_16MB.csv 
board_build.partitions = partitions.csv

build_flags = 
    -Wall ;all errors that everybody could agree on
    -Wextra ;somebody agree on
    ; -Werror ;Think of "Warning" as "Error".
    -D CORE_DEBUG_LEVEL=1 ;Debug level 0-5
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1 ;1 is to use the USB port as a serial port
    -D ARDUINO_RUNNING_CORE=1       ; Arduino Runs On Core (setup, loop)
    -D ARDUINO_EVENT_RUNNING_CORE=1 ; Events Run On Core
    -D DEVICE_HAS_DISPLAY=1        ; bật nếu nạp cho T Conenect (k cmt dùng có màn hình, cmt dùng ko có màn hình)
    ;-D ENABLE_WIFI_AP=1            ; bật phát AP nếu thiết bị disconnect to server quá 10 lần

[env:esp32_mp3_sd]
platform = espressif32 @6.5.0
board = esp32s3_flash_16MB
framework = arduino
upload_port = COM16
monitor_port = COM16
monitor_speed = 115200 ;Serial Baud Rate Setting

; debug_tool = esp-builtin
; upload_protocol = esp-builtin
upload_speed = 921600 ; 460800, 512000, 460800, 256000, 115200
board_upload.flash_size = 16MB 

board_build.memory_type = qio_opi ;Enable internal PSRAM
; board_build.memory_type = qio_qspi ;Enable external PSRAM

board_build.partitions = default_16MB.csv 

build_flags = 
    -Wall ;all errors that everybody could agree on
    -Wextra ;somebody agree on
    ; -Werror ;Think of "Warning" as "Error".
    -D CORE_DEBUG_LEVEL=1 ;Debug level 0-5
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1 ;1 is to use the USB port as a serial port
    -D ARDUINO_RUNNING_CORE=1       ; Arduino Runs On Core (setup, loop)
    -D ARDUINO_EVENT_RUNNING_CORE=1 ; Events Run On Core
    -D DEVICE_SPEAK=1             ; bật nếu nạp cho loa
    -D USE_SERIAL0=1                #  k cmt dùng Serial0 (UART0)- dùng cho loa, cmt dùng Serial (USB CDC) - dùng cho T Connect
    ;-D ENABLE_WIFI_AP=1            ; bật phát AP nếu thiết bị disconnect to server quá 10 lần

